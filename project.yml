name: SmartSlack
options:
  bundleIdPrefix: com.tshan
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  SmartSlack:
    type: application
    platform: macOS
    sources:
      - path: SmartSlack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tshan.smartslack
        PRODUCT_NAME: SmartSlack
        INFOPLIST_FILE: SmartSlack/Info.plist
        CODE_SIGN_ENTITLEMENTS: SmartSlack/SmartSlack.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        ENABLE_APP_SANDBOX: false
        SWIFT_EMIT_LOC_STRINGS: true
